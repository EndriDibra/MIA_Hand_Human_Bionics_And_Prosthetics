services:
  miahand_ros2:
    build:
      context: ..
      dockerfile: docker-deployment/Dockerfile
      args:
        - USER_UID=${USER_UID}
        - USER_GID=${USER_GID}
    container_name: miahand_ros2
    network_mode: "host"
    device_cgroup_rules:
      - "c 188:* rmw"
    privileged: true
    tty: true
    stdin_open: true
    volumes:
      - ../:/miahand_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix
    entrypoint: /ros_entrypoint.sh
    environment:
      PYTHONPATH: "/opt/ros/jazzy/lib/python3.12/site-packages"
      QT_X11_NO_MITSHM: 1
      DISPLAY: $DISPLAY
    command: /bin/bash

  miahand_description:
    extends: miahand_ros2
    container_name: miahand_ros2_rviz
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_description mia_hand_rviz_launch.py;
        /bin/bash
      "
  miahand_driver:
    extends: miahand_ros2
    container_name: miahand_ros2_driver
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_driver mia_hand_driver_launch.py;
        /bin/bash
      "
  miahand_moveit:
    extends: miahand_ros2
    container_name: miahand_ros2_moveit
    environment:
      - USE_MUJOCO_SIM=${USE_MUJOCO_SIM:-false}
      - USE_MOCK_HARDWARE=${USE_MOCK_HARDWARE:-false}
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_moveit_config mia_hand_moveit.launch.py use_mujoco_sim:=${USE_MUJOCO_SIM:-false} use_mock_hardware:=${USE_MOCK_HARDWARE:-false};
        /bin/bash
      "
  miahand_mujoco:
    extends: miahand_ros2
    container_name: miahand_ros2_mujoco
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_mujoco mia_hand_system_interface_launch.py;
        /bin/bash
      "
  miahand_ros2_control:
    extends: miahand_ros2
    container_name: miahand_ros2_control
    environment:
      - USE_MOCK_HARDWARE=${USE_MOCK_HARDWARE:-false}
    command:  >
      bash -c "
        source install/setup.bash &&
        ros2 launch mia_hand_ros2_control mia_hand_system_interface_launch.py use_mock_hardware:=${USE_MOCK_HARDWARE:-false};
        /bin/bash
      "

