publisher_position_trajectory_controller:
  ros__parameters:

    controller_name: "group_trajectory_controller"
    wait_sec_between_publish: 3

    goal_names: ["pos1", "pos2", "pos3"]
    pos1:
      positions: [0.0, 0.0,0.0]
    pos2:
      positions: [0.4, 1.0, 1.0]
    pos3:
      positions: [0.15, 0.70, 0.5]

    joints:
      - $(var prefix)j_thumb_fle
      - $(var prefix)j_index_fle
      - $(var prefix)j_mrl_fle

    check_starting_point: false
    starting_point_limits:
      $(var prefix)j_thumb_fle: [-0.1, 0.1, 0.0]
      $(var prefix)j_index_fle: [-0.1, 0.1, 0.0]
      $(var prefix)j_mrl_fle: [-0.1, 0.1, 0.0]
